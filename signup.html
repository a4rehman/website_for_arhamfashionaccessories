<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account | Arham Fashion Accessories Center</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/src/style.css">
</head>

<body>
    <header class="header">
        <div class="container navbar">
            <div class="logo-container">
                <div class="logo-icon"><i class="fa-solid fa-scissors"></i></div>
                <div class="logo-text">Arham <span>Fashion</span></div>
            </div>
            <nav class="nav-links">
                <a href="/index.html">Home</a>
                <a href="/shop.html">Products</a>
                <a href="/index.html#contact">Contact</a>
            </nav>
        </div>
    </header>

    <main class="section auth-section">
        <div class="container animate-up">
            <div class="review-card"
                style="max-width: 450px; text-align: left; background: var(--bg-light); padding: 40px; border-radius: 25px; box-shadow: var(--shadow-md); margin: 0 auto;">
                <h1 style="margin-bottom: 10px; font-size: 2rem;">Join Us</h1>
                <p style="margin-bottom: 30px; color: #777;">Create an account to start shopping</p>
                <form>
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label style="display: block; font-weight: 600; margin-bottom: 8px;">Full Name</label>
                        <input type="text" placeholder="Your Name"
                            style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 10px;"
                            required>
                    </div>
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label style="display: block; font-weight: 600; margin-bottom: 8px;">Email Address</label>
                        <input type="email" placeholder="Email"
                            style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 10px;"
                            required>
                    </div>
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label style="display: block; font-weight: 600; margin-bottom: 8px;">Password</label>
                        <input type="password" placeholder="Password"
                            style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 10px;"
                            required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
                </form>
                <p style="text-align: center; margin-top: 30px; font-size: 0.9rem; color: #777;">Already have an
                    account? <a href="/login.html" style="color: var(--primary); font-weight: 700;">Sign in</a></p>
            </div>
        </div>
    </main>

    <script type="module" src="/src/main.js"></script>
</body>

</html>
